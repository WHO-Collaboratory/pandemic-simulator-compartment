name: smoke-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      models: ${{ steps.find.outputs.models }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          models=$(ls -d compartment/models/*/example-config.json 2>/dev/null | xargs -I{} dirname {} | xargs -I{} basename {} | jq -R . | jq -sc .)
          echo "models=$models" >> "$GITHUB_OUTPUT"
          echo "Discovered models: $models"

  test:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJson(needs.discover.outputs.models) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Unit tests
        run: uv run python -m pytest tests/test_smoke.py -v -m "not integration"

      - name: Smoke test ${{ matrix.model }}
        run: uv run python -m pytest tests/test_smoke.py -v -m integration -k "${{ matrix.model }}"
