name: smoke-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        disease_path: [covid_jax_model, dengue_jax_model, mpox_jax_model]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run smoke tests for ${{ matrix.disease_path }}
        run: uv run python -m pytest tests/test_smoke.py -v -m integration -k "${{ matrix.disease_path }}"
