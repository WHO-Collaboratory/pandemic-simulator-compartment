name: model-artifact

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        disease_type: [MONKEYPOX]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Generate model artifact
        run: uv run python -m compartment.generate_artifact ${{ matrix.disease_type }} --output artifact.json

      - name: Compute SHA256 hash
        id: hash
        run: |
          HASH=$(sha256sum artifact.json | awk '{ print $1 }')
          echo "sha256=${HASH}" >> "$GITHUB_OUTPUT"

      - name: Log in to AWS
        if: github.repository == 'WHO-Collaboratory/pandemic-simulator-compartment'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
          aws-region: us-east-1

      - name: Upload artifact to S3
        if: github.repository == 'WHO-Collaboratory/pandemic-simulator-compartment'
        run: |
          KEY="${{ steps.hash.outputs.sha256 }}.json"
          RESPONSE=$(aws s3api head-object --bucket "${{ secrets.ARTIFACT_BUCKET }}" --key "$KEY" 2>&1) \
            && EXIT_CODE=0 || EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            echo "Artifact ${KEY} already exists in S3, skipping upload."
          elif echo "$RESPONSE" | grep -q "404\|NoSuchKey\|Not Found"; then
            aws s3 cp artifact.json "s3://${{ secrets.ARTIFACT_BUCKET }}/${KEY}" \
              --content-type application/json
          else
            echo "Unexpected error checking S3: ${RESPONSE}"
            exit 1
          fi

      - name: Record artifact hash in DynamoDB
        if: github.repository == 'WHO-Collaboratory/pandemic-simulator-compartment'
        run: |
          aws dynamodb put-item \
            --table-name "${{ secrets.IMAGE_HASH_TABLE }}" \
            --item '{
              "image": {"S": "${{ matrix.disease_type }}-${{ github.ref_name }}"},
              "artifact_hash":  {"S": "${{ steps.hash.outputs.sha256 }}"}
            }'
