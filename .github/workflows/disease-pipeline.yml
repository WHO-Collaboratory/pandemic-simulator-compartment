name: disease-pipeline

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  smoke-tests:
    uses: ./.github/workflows/smoke-tests.yml

  build-image:
    needs: smoke-tests
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - disease_path: covid_jax_model
            model_display_name: "Novel Respiratory"
          - disease_path: dengue_jax_model
            model_display_name: "Novel Vector-Borne"
          - disease_path: mpox_jax_model
            model_display_name: "Test Mpox Model"
          - disease_path: hantavirus_jax_model
            model_display_name: "Hantavirus"
          - disease_path: hantavirus_human_jax_model
            model_display_name: "Hantavirus (Human Transmission)"
          - disease_path: test_covid_sir_stochastic
            model_display_name: "COVID SIR (Stochastic)"
          - disease_path: test_klebsiella_amr_model
            model_display_name: "Klebsiella AMR"
          - disease_path: ebola_jax_model
            model_display_name: "Ebola"
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image builds when not a tag
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: docker build . -t pansim-compartment-${{ matrix.disease_path }}

      - name: Log in to AWS
        if: github.repository == 'WHO-Collaboratory/pandemic-simulator-compartment' && startsWith(github.ref, 'refs/tags/')
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
          aws-region: us-east-1

      - name: Log in to ECR
        if: github.repository == 'WHO-Collaboratory/pandemic-simulator-compartment' && startsWith(github.ref, 'refs/tags/')
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image for lambda
        if: github.repository == 'WHO-Collaboratory/pandemic-simulator-compartment' && startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/pandemic-simulator-compartment/${{ matrix.disease_path }}:${{ github.ref_name }}
          build-args: |
            MODEL_DIR=compartment/models/${{ matrix.disease_path }}/

  generate-artifact:
    needs: [smoke-tests, build-image]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - disease_path: covid_jax_model
            model_display_name: "Novel Respiratory"
          - disease_path: dengue_jax_model
            model_display_name: "Novel Vector-Borne"
          - disease_path: mpox_jax_model
            model_display_name: "Test Mpox Model"
          - disease_path: hantavirus_jax_model
            model_display_name: "Hantavirus"
          - disease_path: hantavirus_human_jax_model
            model_display_name: "Hantavirus (Human Transmission)"
          - disease_path: test_covid_sir_stochastic
            model_display_name: "COVID SIR (Stochastic)"
          - disease_path: test_klebsiella_amr_model
            model_display_name: "Klebsiella AMR"
          - disease_path: ebola_jax_model
            model_display_name: "Ebola"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Generate model artifacts
        run: |
          uv run python -m compartment.generate_artifact \
            --model-dir compartment/models/${{ matrix.disease_path }} \
            --output-dir compartment/models/${{ matrix.disease_path }}/artifacts

      - name: Log in to AWS
        if: github.repository == 'WHO-Collaboratory/pandemic-simulator-compartment'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
          aws-region: us-east-1

      - name: Upload artifacts to S3 and record in DynamoDB
        if: github.repository == 'WHO-Collaboratory/pandemic-simulator-compartment'
        run: |
          set -euo pipefail
          for artifact in compartment/models/${{ matrix.disease_path }}/artifacts/*.json; do
            HASH=$(sha256sum "$artifact" | awk '{ print $1 }')
            DISEASE_TYPE=$(jq -r '.disease_type' "$artifact")
            KEY="${HASH}.json"

            RESPONSE=$(aws s3api head-object --bucket "${{ secrets.ARTIFACT_BUCKET }}" --key "$KEY" 2>&1) \
              && EXIT_CODE=0 || EXIT_CODE=$?
            if [ $EXIT_CODE -eq 0 ]; then
              echo "Artifact ${KEY} already exists in S3, skipping upload."
            elif echo "$RESPONSE" | grep -q "404\|NoSuchKey\|Not Found"; then
              aws s3 cp "$artifact" "s3://${{ secrets.ARTIFACT_BUCKET }}/${KEY}" \
                --content-type application/json
            else
              echo "Unexpected error checking S3: ${RESPONSE}"
              exit 1
            fi

            aws dynamodb put-item \
              --table-name "${{ secrets.IMAGE_HASH_TABLE }}" \
              --item "$(jq -nc \
                --arg image "${DISEASE_TYPE}:${{ github.ref_name }}" \
                --arg artifact_hash "${HASH}" \
                '{image:{"S":$image},artifact_hash:{"S":$artifact_hash}}')"
          done

      - name: Publish model version events (EventBridge)
        if: github.repository == 'WHO-Collaboratory/pandemic-simulator-compartment' && startsWith(github.ref, 'refs/tags/')
        env:
          EVENT_BUS_NAME: ${{ secrets.MODEL_PUBLICATION_EVENT_BUS_NAME }}
          SEMVER: ${{ github.ref_name }}
          IMAGE_URI: ${{ secrets.DOCKER_REGISTRY }}/pandemic-simulator-compartment/${{ matrix.disease_path }}:${{ github.ref_name }}
        run: |
          set -euo pipefail
          : "${EVENT_BUS_NAME:?MODEL_PUBLICATION_EVENT_BUS_NAME secret is not set}"
          for artifact in compartment/models/${{ matrix.disease_path }}/artifacts/*.json; do
            HASH=$(sha256sum "$artifact" | awk '{ print $1 }')
            DISPLAY_NAME=$(jq -r '.name' "$artifact")
            S3_KEY="${HASH}.json"
            DETAIL_JSON=$(jq -nc \
              --arg name "${DISPLAY_NAME}" \
              --arg semver "${SEMVER}" \
              --arg image_uri "${IMAGE_URI}" \
              --arg artifact_hash "${HASH}" \
              --arg artifact_s3_key "${S3_KEY}" \
              '{name:$name,semver:$semver,image_uri:$image_uri,artifact_hash:$artifact_hash,artifact_s3_key:$artifact_s3_key}')
            aws events put-events --cli-input-json "$(jq -nc \
              --arg eb "${EVENT_BUS_NAME}" \
              --arg detail "${DETAIL_JSON}" \
              '{Entries:[{Source:"mii.publication",DetailType:"ModelVersionPublished",EventBusName:$eb,Detail:$detail}]}')"
          done
